<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --card: #fffef9;
      --ink: #1a1612;
      --muted: #7a7060;
      --accent: #c4532a;
      --border: #ddd8ce;
      --input-bg: #faf8f4;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.06);
    }

    .eyebrow {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .field {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: #c0b9ac;
    }

    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #a84424; }
    button:active { transform: scale(0.98); }

    .view-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
    }

    .view-link span {
      color: var(--accent);
      font-weight: 500;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">Contacts</p>
    <h1>Add a Contact</h1>
    <p class="subtitle">Save a name and location to your directory.</p>

    <form action="/add" method="post">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Priya Sharma" required/>
      </div>
      <div class="field">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" placeholder="e.g. Pune, Maharashtra" required/>
      </div>
      <button type="submit">Save Contact →</button>
    </form>

    <a href="/contacts" class="view-link">View all contacts <span>here</span></a>
  </div>
</body>
</html>
